name: FSDP Regression Test

on: 
  pull_request:
    paths:
      - 'FSDP/**'
      - 'models/**'
      - 'src/**'
      - 'slurm/**'
  workflow_dispatch:

jobs:
  regression:
    runs-on: [self-hosted, p5]
    timeout-minutes: 360  # 6 hours for the full Llama 2 test
    env:
      USER_NAME: amanrsh
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set env vars
        run: |
          HOME_DIR="/home/${{ env.USER_NAME }}"
          LOG_DIR="${HOME_DIR}/regression-logs"
          CHECKPOINT_DIR="${HOME_DIR}/regression-checkpoints"

          echo "HOME_DIR=$HOME_DIR" >> $GITHUB_ENV
          echo "LOG_DIR=$LOG_DIR" >> $GITHUB_ENV
          echo "CHECKPOINT_DIR=$CHECKPOINT_DIR" >> $GITHUB_ENV

      - name: Create test directory
        run: |
          FSDP_DIR=$(pwd)/3.test_cases/pytorch/FSDP
          cd $FSDP_DIR
          TEST_DIR="${{ env.HOME_DIR }}/regression-test-$(date +%s)"
          echo "TEST_DIR=$TEST_DIR" >> $GITHUB_ENV
          mkdir -p $TEST_DIR/slurm $TEST_DIR/src/model_utils $TEST_DIR/logs $TEST_DIR/checkpoints
          cp -r src/model_utils/* $TEST_DIR/src/model_utils/
          cp slurm/create_venv.sh $TEST_DIR/slurm/
          cp src/train.py src/requirements.txt $TEST_DIR/src/
      
      - name: Create virtual environment
        working-directory: ${{ env.TEST_DIR }}
        run: |
          python3 -m venv env
          source env/bin/activate
          pip install -U wheel setuptools
          pip install -r src/requirements.txt
          mkdir -p checkpoints
          echo "Virtual environment created successfully!"

      - name: Create regression test script
        working-directory: ${{ env.TEST_DIR }}
        run: |
          cat > $TEST_DIR/slurm/regression_test.sbatch << EOF
          #!/bin/bash

          #SBATCH --nodes=4
          #SBATCH --job-name=fsdp_regression_test
          #SBATCH --output=${{ env.LOG_DIR }}/regression_test_%j.out
          #SBATCH --error=${{ env.LOG_DIR }}/regression_test_%j.err
          #SBATCH --exclusive

          set -ex;

          GPUS_PER_NODE=8

          WORKING_DIR=${{ env.TEST_DIR }}

          export DATA_PATH=/fsx
          export FSX_MOUNT=\$WORKING_DIR:\$DATA_PATH

          export FI_LOG_LEVEL=warn
          export NCCL_DEBUG=info
          export FI_PROVIDER=efa
          export FI_EFA_USE_HUGE_PAGE=0
          export FI_EFA_SET_CUDA_SYNC_MEMOPS=0
          export LD_PRELOAD=/usr/local/cuda-12.4/lib/libnccl.so
          export NCCL_SOCKET_IFNAME=^docker,lo,veth,eth
          export HF_HUB_ETAG_TIMEOUT=60

          # Debug information
          echo "Current directory: \$(pwd)"
          echo "Working directory: \$WORKING_DIR"
          ls -la
          echo "Python version: \$(python3 --version)"
          
          # Change to the working directory
          cd \$WORKING_DIR
          
          mkdir -p logs checkpoints

          # Activate the virtual environment using the full path
          source \$WORKING_DIR/env/bin/activate
                                        
          # Check if torchrun is available
          which torchrun || {
            echo "torchrun not found in PATH"
            pip list | grep torch
            exit 1
          }

          declare -a TORCHRUN_ARGS=(
              --nproc_per_node=\$GPUS_PER_NODE
              --nnodes=\$SLURM_JOB_NUM_NODES
              --rdzv_id=\$SLURM_JOB_ID
              --rdzv_backend=c10d
              --rdzv_endpoint=\$(hostname)
          )
          
          export TORCHRUN=torchrun
          export TRAIN_SCRIPT=\$WORKING_DIR/src/train.py

          declare -a TRAINING_ARGS=(
              --max_context_width=4096
              --num_key_value_heads=32
              --intermediate_size=11008
              --hidden_width=4096
              --num_layers=32
              --num_heads=32
              --model_type=llama_v2
              --tokenizer=hf-internal-testing/llama-tokenizer
              --checkpoint_freq=50
              --validation_freq=5
              --max_steps=100
              --checkpoint_dir=${{ env.CHECKPOINT_DIR }}
              --dataset=allenai/c4
              --dataset_config_name=en
              --train_batch_size=1
              --val_batch_size=1
              --sharding_strategy=full
              --offload_activations=1
          )

          cd \$WORKING_DIR/src
          echo "Running training with torchrun"
          srun -l \${TORCHRUN} "\${TORCHRUN_ARGS[@]}" \${TRAIN_SCRIPT} "\${TRAINING_ARGS[@]}"
          exit \$?
          EOF
          chmod +x $TEST_DIR/slurm/regression_test.sbatch


      - name: Run regression test
        id: run_test
        working-directory: ${{ env.TEST_DIR }}
        continue-on-error: true
        run: |
          mkdir -p ${{ env.LOG_DIR }} ${{ env.CHECKPOINT_DIR }}
          chmod 755 ${{ env.LOG_DIR }} ${{ env.CHECKPOINT_DIR }}
          echo "Submitting Slurm job..."
          TEST_DIR=${{ env.TEST_DIR }} sbatch --wait slurm/regression_test.sbatch
          exit_code=$?
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          echo "Slurm job completed with exit code: $exit_code"

      - name: List logs
        if: always()
        working-directory: ${{ env.TEST_DIR }}
        run: |
          echo "Contents of logs directory:"
          ls -la ${{ env.LOG_DIR }}/ || echo "No logs directory found"
          for log in ${{ env.LOG_DIR }}/regression_test_*.out; do
            if [ -f "$log" ]; then
              echo "=== Job Output ($log) ==="
              cat "$log"
            fi
          done
          for log in ${{ env.LOG_DIR }}/regression_test_*.err; do
            if [ -f "$log" ]; then
              echo "=== Job Error ($log) ==="
              cat "$log"
            fi
          done

      - name: Save logs
        if: always()
        run: |
          echo "Logs saved to ${{ env.LOG_DIR }}"
          echo "Checkpoints saved to ${{ env.CHECKPOINT_DIR }}"

      
      - name: Check test result
        if: steps.run_test.outputs.exit_code != '0'
        run: |
          echo "Regression test failed with exit code ${{ steps.run_test.outputs.exit_code }}"
          exit 1
